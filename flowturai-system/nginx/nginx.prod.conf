events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/json text/css application/javascript;

  # Rate Limiting – schützt vor Spam-Anfragen
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

  # HTTP → HTTPS Redirect
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS – Haupt-App
  server {
    listen 443 ssl;
    server_name DEINE_DOMAIN;  # z.B. flowturai.de

    ssl_certificate     /etc/letsencrypt/live/DEINE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DEINE_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Sicherheits-Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    # API-Endpunkte
    location /api/ {
      limit_req zone=api burst=5 nodelay;
      proxy_pass         http://api:3000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # Admin Dashboard
    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
